# system.conf — Single source of truth for the CLUSTR cluster.
#
# Usage:
#   ./scheduler [system.conf]
#
# The scheduler reads this file on startup and shows all listed workers in the
# TUI even before they connect.  Press [d] on any OFFLINE worker to deploy it
# inline — no separate terminal required.
#
# ── Global defaults ────────────────────────────────────────────────────────────
# These values are inherited by every [worker] section below.
# Per-worker sections can override any field.

scheduler_ip=100.123.147.70        # IP of THIS machine (written to remote worker conf)
scheduler_port=9999

ssh_key_path=~/.ssh/id_rsa      # SSH private key used for all workers
work_dir=/tmp/clustr

# ── Worker sections ────────────────────────────────────────────────────────────
# Each section header is the display name shown in the TUI.
# deploy_host MUST be an IP address (not a hostname) — used to match
# live TCP connections back to this entry.
# deploy_user and deploy_host are required per section.

[maturin]
deploy_host=100.92.163.46
deploy_user=nate

[neuromancer]
deploy_host=100.100.147.7
deploy_user=nate

# [gdp]
# deploy_host=100.71.200.81
# deploy_user=root

[local]
deploy_host=100.123.147.70
deploy_user=NateAlmanza2022